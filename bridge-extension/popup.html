<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GMAT Capture Bridge</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <p class="eyebrow">GMAT bridge</p>
      <h1>Capture visible result</h1>
      <p class="copy">Use this only on a visible result page you are allowed to view. It does not log in, scrape in the background, or upload data.</p>
      <button id="copy-capture" type="button">Copy Screenshot</button>
      <button id="download-capture" type="button" class="secondary">Download PNG</button>
      <p id="status" role="status">Ready.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
